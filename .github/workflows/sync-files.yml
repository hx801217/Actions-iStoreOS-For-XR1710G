name: Sync Files

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - name: 准备完成
      uses: actions/checkout@v4

    - name: 检查本地配置文件
      run: |
        echo "xr1710g/.config 和 xr1710g/feeds.conf 已在仓库中维护"
        echo "如有官方配置源，可在此添加下载逻辑"

    - name: 删除运行记录
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "保留最近 1 条运行记录，删除旧记录..."
        gh run list --workflow="Sync Files" --limit 50 --json databaseId --jq '.[].databaseId' | \
          tail -n +2 | \
          xargs -I {} gh run delete {} --yes || true
